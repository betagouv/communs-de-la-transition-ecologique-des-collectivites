name: Production Deployment

# Manual trigger with a button in GitHub interface
on:
  workflow_dispatch:

# Permissions needed for pushing version tags and commits to main
permissions:
  contents: write

jobs:
  # Job 1 — bump the version, update the changelog, commit and tag, push to main.
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.ADMIN_PAT }}
          # Using admin PAT to bypass branch protection rules for version bump

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Setup Git hooks
        run: pnpm prepare

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

      - name: Generate new version
        # Idempotent: if HEAD is already a release tag, the release has already
        # happened (e.g. the workflow is re-dispatched after a deploy failure).
        # Skip the bump instead of failing on "tag already exists".
        run: |
          if git describe --tags --exact-match HEAD >/dev/null 2>&1; then
            echo "✅ HEAD déjà taggé ($(git describe --tags --exact-match HEAD)) — release sautée."
          else
            HUSKY=0 pnpm --filter api run release
          fi

      - name: Push changes and tags
        run: git push --follow-tags origin main

  # Job 2 — deploy main to Scalingo. Separate job so that re-running a failed
  # deployment never replays the release step (which would collide on the tag).
  deploy:
    needs: release
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      # Check out main at its current tip — i.e. the release commit the
      # `release` job just pushed, not the SHA that triggered the workflow.
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SCALINGO_BETA_GOUV_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H -t rsa,ecdsa,ed25519 ssh.osc-fr1.scalingo.com >> ~/.ssh/known_hosts

      - name: Prepare package.json for Scalingo
        run: |
          set -e
          echo "🔧 Patching package.json files for Scalingo buildpack compatibility..."

          # Temporary patch: Remove npm/yarn engine restrictions for Scalingo
          # Local protection via engine-strict + engines fields is maintained in git

          # Patch root package.json
          node -e "const fs=require('fs'); const pkg=JSON.parse(fs.readFileSync('package.json')); delete pkg.engines.npm; delete pkg.engines.yarn; fs.writeFileSync('package.json', JSON.stringify(pkg,null,2));"

          # Patch api/package.json (the one Scalingo actually uses)
          node -e "const fs=require('fs'); const pkg=JSON.parse(fs.readFileSync('api/package.json')); delete pkg.engines.npm; delete pkg.engines.yarn; fs.writeFileSync('api/package.json', JSON.stringify(pkg,null,2));"

          # Commit the patch (will be pushed to Scalingo only, not to GitHub)
          # HUSKY=0 bypasses pre-commit hooks (no need to format as this is ephemeral)
          git add package.json api/package.json
          HUSKY=0 git commit -m "chore(deploy): remove npm/yarn engines for Scalingo buildpack [ci skip]"

          echo "✅ Both package.json files patched for deployment"

      - name: Deploy to Scalingo Production
        run: |
          set -e  # Exit on any error
          echo "🚀 Deploying to Scalingo production environment..."

          # Force push required: ephemeral commit overwrites previous deployment
          # Each deployment creates a new patch commit that must replace the previous one
          GIT_SSH_COMMAND="ssh -v" git push --force git@ssh.osc-fr1.scalingo.com:les-communs-transition-ecologique-api-prod.git main 2>&1 | tee deploy.log
          PUSH_STATUS=${PIPESTATUS[0]}

          if [ $PUSH_STATUS -ne 0 ]; then
            echo "❌ Git push failed with exit code $PUSH_STATUS"
            cat deploy.log
            exit 1
          fi

          echo "✅ Git push completed"

          # Check if deployment succeeded by looking for error indicators in output
          if grep -qE "Build failed|Error deploying|Invalid return code" deploy.log; then
            echo "❌ Deployment failed during build! Check logs above."
            exit 1
          fi

          echo "✅ Deployment successful!"
